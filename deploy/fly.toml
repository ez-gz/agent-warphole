# Fly.io configuration for the agent-warphole VM.
#
# To redeploy (run from repo root — build context must include phone/):
#   fly deploy --config deploy/fly.toml --dockerfile deploy/Dockerfile --yes
# setup.sh handles this for new installs automatically.
#
# Cost: ~$20-30/mo for shared-cpu-2x with 2gb RAM.

app            = "ztester123"   # patched by setup.sh on fresh install
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"   # relative to fly.toml location (deploy/)

[vm]
  memory   = "2gb"
  cpu_kind = "shared"
  cpus     = 2

# Phone UI — served publicly at https://{app}.fly.dev
# No auth yet. warphole go starts it pointed at the active session.
# warphole suck puts it back to waiting mode.
[http_service]
  internal_port        = 8420
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = false
  min_machines_running = 1

# SSH — internal only, accessed via fly proxy by warphole.sh
# fly proxy {port}:2222 -a {app}

# Persistent volume — preserves Claude auth, session files, project state across restarts.
# Added by setup.sh if a volume size was specified. Remove this section if running stateless.
[[mounts]]
  source      = "home"
  destination = "/home/user"
