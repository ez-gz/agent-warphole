# Fly.io configuration for the agent-warphole VM.
#
# Deploy from the repo root (not deploy/):
#   fly deploy --config deploy/fly.toml
# setup.sh handles this automatically.
#
# Cost: ~$20-30/mo for shared-cpu-2x with 2gb RAM.

app            = "your-app-name"   # replaced by setup.sh — do not edit manually
primary_region = "ord"

[build]
  dockerfile = "deploy/Dockerfile"   # relative to repo root (build context = repo root)

[vm]
  memory   = "2gb"
  cpu_kind = "shared"
  cpus     = 2

# Phone UI — served publicly at https://{app}.fly.dev
# No auth yet. warphole go starts it pointed at the active session.
# warphole suck puts it back to waiting mode.
[http_service]
  internal_port        = 8420
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = false
  min_machines_running = 1

# SSH — internal only, accessed via fly proxy by warphole.sh
# fly proxy {port}:2222 -a {app}
