# Fly.io configuration for the agent-warphole VM.
#
# This machine stays always-on. Cost is ~$20-30/mo for a shared-cpu-2x
# with 2GB RAM. Scale up cpu_kind to "performance" if claude feels slow.
#
# By default this runs without a mounted volume.
# If you want Claude auth, session data, and synced project files to survive
# machine replacement or restart, provision a `home` volume and add a mount.

app = "ez-pz-agent-warphole"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[vm]
  memory   = "2gb"
  cpu_kind = "shared"
  cpus     = 2

# No public services — access is via `fly ssh console` only.
# Fly's wireguard mesh handles auth; no exposed ports needed.
